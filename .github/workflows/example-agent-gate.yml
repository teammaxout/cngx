# Example: gate agent output files in CI with no API keys.
# Dogfoods the root composite action on pull requests.

name: Example Agent Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  agent-gate-example:
    name: Gate agent output files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage unverified agent output
        run: cp tests/fixtures/agent_outputs/unverified_patch.txt /tmp/agent_output.txt

      - name: cngx check unverified patch (expect blocked)
        uses: ./
        with:
          install-mode: editable
          policy: examples/contracts/coding_agent_verification.yaml
          prompt: "Fix the pagination bug and run tests before merge"
          output-file: /tmp/agent_output.txt
        continue-on-error: true
        id: gate_unverified

      - name: Assert unverified output was blocked
        run: |
          if [ "${{ steps.gate_unverified.outcome }}" != "failure" ]; then
            echo "Expected exit 1 (blocked) for unverified agent output"
            exit 1
          fi
          echo "Unverified patch correctly blocked"

      - name: Stage pytest evidence log
        run: |
          cat > /tmp/pytest.log <<'EOF'
          ============================= test session starts ==============================
          collected 12 items
          tests/test_users.py ............                                         [100%]
          ============================= 12 passed in 0.41s ===============================
          EOF

      - name: cngx check verified fix (expect pass)
        uses: ./
        with:
          install-mode: editable
          policy: examples/contracts/coding_agent_verification.yaml
          prompt-file: tests/fixtures/action_prompt.txt
          output-file: tests/fixtures/agent_outputs/verified_fix.txt
          evidence-file: /tmp/pytest.log
