# Example: block a false agent claim in CI, no API keys.
# Dogfoods the root composite action on pull requests.
#
# On a real repo you would run the tests directly:
#
#   - uses: aadi-joshi/cngx@v0.2.0
#     with:
#       output-file: agent_message.md
#       command: pytest -q
#
# Here we use evidence-file (a real test log from a prior step) so the demo is
# deterministic and needs no project test environment.

name: Example Agent Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  agent-gate-example:
    name: Gate agent output files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write a failing test log
        run: |
          cat > /tmp/pytest_fail.log <<'EOF'
          ============================= test session starts ==============================
          collected 12 items
          tests/test_users.py .........FF.                                          [100%]
          =========================== 10 passed, 2 failed in 0.5s ========================
          EOF

      - name: Verify unverified patch against the real log (expect blocked)
        uses: ./
        with:
          install-mode: editable
          output-file: tests/fixtures/agent_outputs/unverified_patch.txt
          evidence-file: /tmp/pytest_fail.log
        continue-on-error: true
        id: gate_unverified

      - name: Assert the false claim was blocked
        run: |
          if [ "${{ steps.gate_unverified.outcome }}" != "failure" ]; then
            echo "Expected exit 1 (blocked): agent said ready to merge, tests failed"
            exit 1
          fi
          echo "False claim correctly blocked"

      - name: Write a passing test log
        run: |
          cat > /tmp/pytest_pass.log <<'EOF'
          ============================= test session starts ==============================
          collected 12 items
          tests/test_users.py ............                                         [100%]
          ============================= 12 passed in 0.41s ===============================
          EOF

      - name: Verify a real fix against the real log (expect pass)
        uses: ./
        with:
          install-mode: editable
          output-file: tests/fixtures/agent_outputs/verified_fix.txt
          evidence-file: /tmp/pytest_pass.log
