name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Test Built Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install built package
        run: pip install dist/*.whl

      - name: Smoke test, CLI
        run: |
          cogscope version
          cogscope --help
          cogscope quickstart

      - name: Smoke test, pipx install from wheel
        run: |
          python -m pip install pipx
          python -m pipx install dist/*.whl
          "$(python -m pipx environment --value PIPX_BIN_DIR)/cogscope" version
          "$(python -m pipx environment --value PIPX_BIN_DIR)/cogscope" quickstart

      - name: Smoke test, Python import
        run: python -c "from cogscope import __version__; from cogscope.capture.tracer import CogscopeTracer; print(__version__)"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    environment:
      name: pypi
      url: https://pypi.org/project/cogscope/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker-proxy:
    name: Publish proxy Docker image
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push proxy image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cogscope-proxy:latest
            ghcr.io/${{ github.repository }}/cogscope-proxy:${{ steps.version.outputs.VERSION }}
