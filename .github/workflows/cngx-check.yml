# Dogfooding: run cngx policy checks in CI (no API keys required).

name: cngx Policy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  policy-check:
    name: Policy Check (mock)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Init cngx
        run: cngx init --yes

      - name: Policy check, basic reasoning
        run: |
          cngx check -c examples/contracts/basic_reasoning.yaml \
            "What is 15 * 7? Show your reasoning step by step." \
            --adapter mock --model mock-model

      - name: Policy check, math (expect pass or review, not crash)
        run: |
          cngx check -c examples/contracts/math_reasoning.yaml \
            "A rectangle has length 8 and width 5. What is the perimeter?" \
            --adapter mock --model mock-model
        continue-on-error: true

      - name: Policy check, offline agent output (expect block)
        run: |
          set +e
          cngx check -c examples/contracts/coding_agent_fix.yaml \
            -p "Fix the pagination bug and run tests before merge" \
            --output-file tests/fixtures/shallow_agent_output.txt
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "Expected exit 1 (blocked), got $code"
            exit 1
          fi

      - name: Quickstart smoke
        run: cngx quickstart

  action-smoke:
    name: Reusable Action Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run root action (editable)
        uses: ./
        with:
          install-mode: editable
          policy: examples/contracts/basic_reasoning.yaml
          prompt: "What is 15 * 7? Show your reasoning step by step."

      - name: Run root action (prompt-file)
        uses: ./
        with:
          install-mode: editable
          policy: examples/contracts/basic_reasoning.yaml
          prompt-file: tests/fixtures/action_prompt.txt
          task-id: action_prompt_file

      - name: Run root action (offline output-file, expect block)
        uses: ./
        with:
          install-mode: editable
          policy: examples/contracts/coding_agent_fix.yaml
          prompt: "Fix the pagination bug and run tests before merge"
          output-file: tests/fixtures/shallow_agent_output.txt
        continue-on-error: true
        id: offline_action

      - name: Verify offline action blocked
        run: |
          if [ "${{ steps.offline_action.outcome }}" != "failure" ]; then
            echo "Expected offline action to fail with exit 1 (blocked)"
            exit 1
          fi
          echo "Offline action correctly blocked unverified agent output"

      - name: Summary
        if: always()
        run: |
          echo "cngx check exit codes: 0=pass, 1=blocked, 2=failed"
          echo "Policy files: examples/contracts/*.yaml"
