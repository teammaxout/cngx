name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check cngx/ tests/ tracker/

      - name: Black check
        run: black --check cngx/ tests/ tracker/

      - name: Mypy
        run: mypy cngx/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (no skips allowed)
        run: pytest tests/ -v --tb=short -rs

  package-smoke:
    name: Package smoke (pip + pipx)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and verify pip/pipx install
        run: |
          python -m pip install --upgrade pip build pipx
          python -m build
          pip install dist/*.whl
          cngx version
          cngx quickstart
          pipx install dist/*.whl
          "$(pipx environment --value PIPX_BIN_DIR)/cngx" version

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install safety bandit

      - name: Safety check
        run: safety check --full-report
        continue-on-error: true

      - name: Bandit security scan
        run: |
          bandit -r cngx/ -f json -o bandit-report.json --exit-zero
          bandit -r cngx/ --severity-level high --confidence-level high

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  docker-proxy:
    name: Docker, local proxy image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cngx-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tracker-build:
    name: Tracker site build
    runs-on: ubuntu-latest
    needs: [test, package-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build tracker
        run: python tracker/build.py

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs extras
        run: pip install -e ".[docs]"

      - name: Build docs
        run: mkdocs build --strict
