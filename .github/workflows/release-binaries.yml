name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            asset_name: cngx-linux-x86_64
          - os: macos-latest
            label: macos-arm64
            asset_name: cngx-macos-arm64
          - os: windows-latest
            label: windows-x86_64
            asset_name: cngx-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built package and PyInstaller
        run: |
          python -m pip install dist/*.whl
          python -m pip install "pyinstaller>=6.0.0"

      - name: Build standalone executable
        run: pyinstaller packaging/pyinstaller/cngx.spec --noconfirm

      - name: Smoke test executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="dist/cngx.exe"
          else
            BIN="dist/cngx"
          fi
          "$BIN" --help
          "$BIN" version
          "$BIN" quickstart
          # Offline policy check: expect exit 1 (policy fail), not import crash.
          set +e
          "$BIN" check \
            -c examples/contracts/coding_agent_verification.yaml \
            --output-file tests/fixtures/agent_outputs/unverified_patch.txt \
            -p "task"
          CHECK_RC=$?
          set -e
          if [ "$CHECK_RC" -eq 1 ]; then
            echo "check smoke: policy fail (exit 1) as expected"
          else
            echo "check smoke: unexpected exit $CHECK_RC (want 1 for policy fail)"
            exit 1
          fi

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/cngx.exe "release-assets/${{ matrix.asset_name }}"
          else
            cp dist/cngx "release-assets/${{ matrix.asset_name }}"
            chmod +x "release-assets/${{ matrix.asset_name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}

  attach:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
