# Reasoning policy: basic structure
# Lenient floor for well-formed responses. Not a quality verdict.

name: basic_reasoning
version: "1.0.1"
description: |
  Minimum viable reasoning structure.
  Most models should pass this policy on non-trivial prompts.

depth:
  min: 1
  severity: fail

steps:
  min: 1
  severity: fail

# Keep this low so concise correct answers are not failed for length alone.
output:
  min_length: 8
  severity: fail

fail_on_violation: true
