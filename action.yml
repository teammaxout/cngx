name: cngx Policy Check
description: Run cngx check against a YAML behavior policy in CI
branding:
  icon: check-circle
  color: green

inputs:
  policy:
    description: Path to the behavior policy YAML file (relative to repository root)
    required: true
  prompt:
    description: Prompt or task text. Omit if using prompt-file.
    required: false
    default: ""
  prompt-file:
    description: Path to a file containing the prompt text
    required: false
    default: ""
  response:
    description: Inline agent output to gate offline (no LLM call). Omit if using response-file.
    required: false
    default: ""
  response-file:
    description: Path to a file with agent output to gate offline (no LLM call)
    required: false
    default: ""
  python-version:
    description: Python version for setup-python
    required: false
    default: "3.11"
  cngx-version:
    description: Pin a cngx PyPI release (for example 0.1.0). Leave empty for latest.
    required: false
    default: ""
  install-mode:
    description: "pypi (default) or editable (pip install -e . from checkout, for dogfooding)"
    required: false
    default: pypi
  model:
    description: Model name passed to cngx check
    required: false
    default: mock-model
  adapter:
    description: Adapter (mock, openai, gemini, claude). Online capture only.
    required: false
    default: mock
  task-id:
    description: Task ID for the capture
    required: false
    default: policy_check
  json-output:
    description: Emit JSON results to stdout
    required: false
    default: "false"
  init:
    description: Run cngx init --yes before check
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cngx
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-mode }}" = "editable" ]; then
          pip install -e .
        elif [ -n "${{ inputs.cngx-version }}" ]; then
          pip install "cngx==${{ inputs.cngx-version }}"
        else
          pip install cngx
        fi
        cngx version

    - name: Initialize cngx
      if: inputs.init == 'true'
      shell: bash
      run: cngx init --yes

    - name: Run cngx check
      shell: bash
      run: |
        set -euo pipefail
        POLICY="${{ inputs.policy }}"
        if [ ! -f "$POLICY" ]; then
          echo "Policy file not found: $POLICY" >&2
          exit 2
        fi

        if [ -n "${{ inputs.prompt-file }}" ]; then
          if [ ! -f "${{ inputs.prompt-file }}" ]; then
            echo "prompt-file not found: ${{ inputs.prompt-file }}" >&2
            exit 2
          fi
          PROMPT="$(cat "${{ inputs.prompt-file }}")"
        elif [ -n "${{ inputs.prompt }}" ]; then
          PROMPT="${{ inputs.prompt }}"
        else
          echo "Either prompt or prompt-file is required" >&2
          exit 2
        fi

        OFFLINE=false
        if [ -n "${{ inputs.response-file }}" ]; then
          if [ ! -f "${{ inputs.response-file }}" ]; then
            echo "response-file not found: ${{ inputs.response-file }}" >&2
            exit 2
          fi
          OFFLINE=true
        elif [ -n "${{ inputs.response }}" ]; then
          OFFLINE=true
        fi

        ARGS=(
          check
          -c "$POLICY"
          --prompt "$PROMPT"
          --model "${{ inputs.model }}"
          --task "${{ inputs.task-id }}"
        )

        if [ "$OFFLINE" = true ]; then
          if [ -n "${{ inputs.response-file }}" ]; then
            ARGS+=(--response-file "${{ inputs.response-file }}")
          else
            ARGS+=(--response "${{ inputs.response }}")
          fi
        else
          ARGS+=(--adapter "${{ inputs.adapter }}")
          ARGS+=("$PROMPT")
        fi

        if [ "${{ inputs.json-output }}" = "true" ]; then
          ARGS+=(--json)
        fi

        cngx "${ARGS[@]}"
