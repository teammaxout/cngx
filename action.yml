name: cngx Policy Check
description: Run cngx check against a YAML behavior policy in CI
branding:
  icon: check-circle
  color: green

inputs:
  policy:
    description: Path to the behavior policy YAML file (relative to repository root)
    required: true
  prompt:
    description: Prompt or task text for live capture. Optional context for offline gate.
    required: false
    default: ""
  prompt-file:
    description: Path to a file with task prompt context (live capture or offline gate)
    required: false
    default: ""
  output-file:
    description: Path to agent output file for offline gating (no LLM call, no API keys)
    required: false
    default: ""
  evidence-file:
    description: Path to CI/test log for offline cross-check (must contain e.g. N passed)
    required: false
    default: ""
  python-version:
    description: Python version for setup-python
    required: false
    default: "3.11"
  cngx-version:
    description: Pin a cngx PyPI release (for example 0.1.7). Leave empty for latest.
    required: false
    default: ""
  install-mode:
    description: "pypi (default) or editable (pip install -e . from checkout, for dogfooding)"
    required: false
    default: pypi
  model:
    description: Model name label stored on the trace
    required: false
    default: mock-model
  adapter:
    description: Adapter (mock, openai, gemini, claude). Online capture only.
    required: false
    default: mock
  task-id:
    description: Task ID for the capture
    required: false
    default: policy_check
  json-output:
    description: Emit JSON results to stdout
    required: false
    default: "false"
  init:
    description: Run cngx init --yes before check
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cngx
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-mode }}" = "editable" ]; then
          pip install -e .
        elif [ -n "${{ inputs.cngx-version }}" ]; then
          pip install "cngx==${{ inputs.cngx-version }}"
        else
          pip install cngx
        fi
        cngx version

    - name: Initialize cngx
      if: inputs.init == 'true'
      shell: bash
      run: cngx init --yes

    - name: Run cngx check
      shell: bash
      run: |
        set -euo pipefail
        POLICY="${{ inputs.policy }}"
        if [ ! -f "$POLICY" ]; then
          echo "Policy file not found: $POLICY" >&2
          exit 2
        fi

        HAS_OUTPUT=false
        HAS_PROMPT=false
        if [ -n "${{ inputs.output-file }}" ]; then
          HAS_OUTPUT=true
        fi
        if [ -n "${{ inputs.prompt }}" ] || [ -n "${{ inputs.prompt-file }}" ]; then
          HAS_PROMPT=true
        fi

        if [ "$HAS_OUTPUT" != true ] && [ "$HAS_PROMPT" != true ]; then
          echo "Either output-file (offline gate) or prompt/prompt-file (live check) is required" >&2
          exit 2
        fi

        ARGS=(check -c "$POLICY" --model "${{ inputs.model }}" --task "${{ inputs.task-id }}")

        if [ -n "${{ inputs.prompt-file }}" ]; then
          if [ ! -f "${{ inputs.prompt-file }}" ]; then
            echo "prompt-file not found: ${{ inputs.prompt-file }}" >&2
            exit 2
          fi
          ARGS+=(--prompt-file "${{ inputs.prompt-file }}")
        elif [ -n "${{ inputs.prompt }}" ]; then
          ARGS+=(--prompt "${{ inputs.prompt }}")
        fi

        if [ "$HAS_OUTPUT" = true ]; then
          if [ ! -f "${{ inputs.output-file }}" ]; then
            echo "output-file not found: ${{ inputs.output-file }}" >&2
            exit 2
          fi
          ARGS+=(--output-file "${{ inputs.output-file }}")
          if [ -n "${{ inputs.evidence-file }}" ]; then
            if [ ! -f "${{ inputs.evidence-file }}" ]; then
              echo "evidence-file not found: ${{ inputs.evidence-file }}" >&2
              exit 2
            fi
            ARGS+=(--evidence-file "${{ inputs.evidence-file }}")
          fi
        else
          ARGS+=(--adapter "${{ inputs.adapter }}")
          if [ -n "${{ inputs.prompt }}" ]; then
            ARGS+=("${{ inputs.prompt }}")
          fi
        fi

        if [ "${{ inputs.json-output }}" = "true" ]; then
          ARGS+=(--json)
        fi

        cngx "${ARGS[@]}"
