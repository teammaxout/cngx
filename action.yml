name: cngx verify
description: Run the checks an AI agent claimed it ran, and block the merge on a false claim
branding:
  icon: check-circle
  color: green

inputs:
  command:
    description: >-
      Verification command to run (for example "pytest -q"). When set, cngx runs
      it and compares the real result to the agent's claim. This is the main path.
    required: false
    default: ""
  output-file:
    description: Path to the agent's message; cngx reads the verification claim from it
    required: false
    default: ""
  evidence-file:
    description: Path to an existing test/CI log to gate offline instead of running a command
    required: false
    default: ""
  require-claim:
    description: Also block when checks pass but the agent made no verification claim
    required: false
    default: "false"
  timeout:
    description: Seconds before the verification command is killed
    required: false
    default: "600"
  policy:
    description: >-
      (Legacy) YAML behavior policy for the heuristic `cngx check` text lint.
      Prefer `command` with real execution. Ignored when `command` is set.
    required: false
    default: ""
  prompt:
    description: (Legacy check) prompt or task text for live capture
    required: false
    default: ""
  prompt-file:
    description: (Legacy check) file with task prompt context
    required: false
    default: ""
  python-version:
    description: Python version for setup-python
    required: false
    default: "3.11"
  cngx-version:
    description: Pin a cngx PyPI release (for example 0.2.0). Leave empty for latest.
    required: false
    default: ""
  install-mode:
    description: "pypi (default) or editable (pip install -e . from checkout, for dogfooding)"
    required: false
    default: pypi
  model:
    description: (Legacy check) model name label stored on the trace
    required: false
    default: mock-model
  adapter:
    description: (Legacy check) adapter (mock, openai, gemini, claude)
    required: false
    default: mock
  task-id:
    description: (Legacy check) task ID for the capture
    required: false
    default: policy_check
  json-output:
    description: Emit JSON results to stdout
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cngx
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-mode }}" = "editable" ]; then
          pip install -e .
        elif [ -n "${{ inputs.cngx-version }}" ]; then
          pip install "cngx==${{ inputs.cngx-version }}"
        else
          pip install cngx
        fi
        cngx version

    - name: Run cngx verify
      if: inputs.command != '' || inputs.evidence-file != ''
      shell: bash
      run: |
        set -euo pipefail
        ARGS=(verify --timeout "${{ inputs.timeout }}")

        if [ -n "${{ inputs.output-file }}" ]; then
          if [ ! -f "${{ inputs.output-file }}" ]; then
            echo "output-file not found: ${{ inputs.output-file }}" >&2
            exit 2
          fi
          ARGS+=(--output-file "${{ inputs.output-file }}")
        fi
        if [ "${{ inputs.require-claim }}" = "true" ]; then
          ARGS+=(--require-claim)
        fi
        if [ "${{ inputs.json-output }}" = "true" ]; then
          ARGS+=(--json)
        fi

        if [ -n "${{ inputs.command }}" ]; then
          # shellcheck disable=SC2206
          CMD=(${{ inputs.command }})
          cngx "${ARGS[@]}" -- "${CMD[@]}"
        else
          if [ ! -f "${{ inputs.evidence-file }}" ]; then
            echo "evidence-file not found: ${{ inputs.evidence-file }}" >&2
            exit 2
          fi
          cngx "${ARGS[@]}" --evidence-file "${{ inputs.evidence-file }}"
        fi

    - name: Run cngx check (legacy policy lint)
      if: inputs.command == '' && inputs.evidence-file == ''
      shell: bash
      run: |
        set -euo pipefail
        POLICY="${{ inputs.policy }}"
        if [ -z "$POLICY" ]; then
          echo "Provide 'command' (recommended) or 'evidence-file', or a legacy 'policy'." >&2
          exit 2
        fi
        if [ ! -f "$POLICY" ]; then
          echo "Policy file not found: $POLICY" >&2
          exit 2
        fi
        cngx init --yes

        HAS_OUTPUT=false
        HAS_PROMPT=false
        [ -n "${{ inputs.output-file }}" ] && HAS_OUTPUT=true
        { [ -n "${{ inputs.prompt }}" ] || [ -n "${{ inputs.prompt-file }}" ]; } && HAS_PROMPT=true
        if [ "$HAS_OUTPUT" != true ] && [ "$HAS_PROMPT" != true ]; then
          echo "Legacy check needs output-file or prompt/prompt-file" >&2
          exit 2
        fi

        ARGS=(check -c "$POLICY" --model "${{ inputs.model }}" --task "${{ inputs.task-id }}")
        if [ -n "${{ inputs.prompt-file }}" ]; then
          ARGS+=(--prompt-file "${{ inputs.prompt-file }}")
        elif [ -n "${{ inputs.prompt }}" ]; then
          ARGS+=(--prompt "${{ inputs.prompt }}")
        fi
        if [ "$HAS_OUTPUT" = true ]; then
          ARGS+=(--output-file "${{ inputs.output-file }}")
        else
          ARGS+=(--adapter "${{ inputs.adapter }}")
          [ -n "${{ inputs.prompt }}" ] && ARGS+=("${{ inputs.prompt }}")
        fi
        if [ "${{ inputs.json-output }}" = "true" ]; then
          ARGS+=(--json)
        fi
        cngx "${ARGS[@]}"
