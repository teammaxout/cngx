site_name: cngx
site_description: "Run the checks your AI coding agent claimed it ran, and block the merge on a false claim."
site_url: https://aadi-joshi.github.io/cngx
repo_url: https://github.com/aadi-joshi/cngx
repo_name: aadi-joshi/cngx

theme:
  name: material
  logo: assets/logo-light.svg
  favicon: assets/logo-light.svg
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Concepts:
    - Positioning: concepts/positioning.md
    - How Fingerprinting Works: concepts/fingerprinting.md
    - Writing a Policy: concepts/policies.md
    - Drift Detection: concepts/drift.md
    - Session Trajectories: concepts/sessions.md
  - CLI Reference: cli/reference.md
  - Guides:
    - Gate a Coding Agent: guides/gate-coding-agent.md
    - Coding Agent Recipes: guides/coding-agent-recipes.md
    - Wrap Your Agent: guides/wrap-agent.md
    - The Proxy and Your Privacy: guides/proxy-and-privacy.md
    - The Public Drift Log: guides/public-drift-log.md
    - GitHub Action: guides/github-action.md
    - README Badge: guides/badge.md
  - FAQ: faq.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aadi-joshi/cngx
